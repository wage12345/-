services:
  mysql:
    image: mysql:8.0
    container_name: student_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: student_manage
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: student_app
    restart: always
    depends_on:
      - mysql
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123456
      DB_NAME: student_manage
      SESSION_SECRET: student_manage_secret

volumes:
  mysql_data: